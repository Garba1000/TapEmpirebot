<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn X</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#07111f;
  color:white;
  font-family:Arial, sans-serif;
  padding:18px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#00e0ff;
}

.level{
  background:#132033;
  padding:8px 14px;
  border-radius:30px;
  font-size:14px;
}

.balance-box{
  background:linear-gradient(135deg,#00e0ff,#0077ff);
  border-radius:24px;
  padding:30px 20px;
  text-align:center;
  color:#fff;
  margin-bottom:20px;
}

.balance-box h2{
  font-size:50px;
  margin-top:10px;
}

.progress{
  width:100%;
  height:10px;
  background:rgba(255,255,255,0.2);
  border-radius:30px;
  overflow:hidden;
  margin-top:15px;
}

.progress div{
  width:0%;
  height:100%;
  background:#fff;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  border:1px solid #1f2d44;
}

.card h3{
  font-size:16px;
  margin-bottom:10px;
}

.card p{
  font-size:13px;
  opacity:0.8;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:14px;
  background:linear-gradient(45deg,#00e0ff,#0077ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.96);
}

.section{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  border:1px solid #1f2d44;
}

.section h2{
  margin-bottom:12px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#18263b;
  color:white;
  margin-top:10px;
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  background:#101b2d;
  padding:30px;
  border-radius:22px;
  width:90%;
  max-width:350px;
  text-align:center;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ Tap & Earn X</div>
  <div class="level">Level <span id="level">1</span></div>
</div>

<div class="balance-box">
  <p>Total XP</p>
  <h2 id="points">0</h2>

  <div class="progress">
    <div id="bar"></div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h3>👆 Total Taps</h3>
    <p id="taps">0</p>
  </div>

  <div class="card">
    <h3>🏆 Rank</h3>
    <p>Starter</p>
  </div>
</div>

<div class="section">
  <h2>🎮 Tap System</h2>
  <button class="btn" id="tapBtn">Tap +1 XP</button>
</div>

<div class="section">
  <h2>📺 Reward Ad</h2>
  <button class="btn" id="rewardBtn">Watch Ad +10 XP</button>
</div>

<div class="section">
  <h2>🎯 Task Center</h2>
  <button class="btn" id="taskBtn">Complete Task +100 XP</button>
</div>

<div class="section">
  <h2>🎁 Daily Reward</h2>
  <button class="btn" id="dailyBtn">Claim Daily Reward</button>
</div>

<div class="section">
  <h2>👥 Referral</h2>
  <input id="refInput" readonly value="https://t.me/@Profitvablebot?start=12345">
  <button class="btn" id="copyBtn">Copy Referral Link</button>
</div>

<div class="section">
  <h2>💳 Withdraw</h2>

  <select id="method">
    <option>USDT</option>
    <option>Litecoin</option>
    <option>Payeer</option>
    <option>Bank</option>
  </select>

  <input id="wallet" placeholder="Wallet Address">
  <input id="amount" type="number" placeholder="Amount">

  <button class="btn" id="withdrawBtn">Withdraw XP</button>
</div>



<script>
const tg = window.Telegram?.WebApp;
tg?.expand?.();

let xp = parseInt(localStorage.getItem('xp') || '0');
let taps = parseInt(localStorage.getItem('taps') || '0');
let lastDaily = parseInt(localStorage.getItem('daily') || '0');

function update(){
  document.getElementById('points').innerText = xp;
  document.getElementById('taps').innerText = taps;

  let level = Math.floor(xp / 500) + 1;
  document.getElementById('level').innerText = level;

  let progress = (xp % 500) / 500 * 100;
  document.getElementById('bar').style.width = progress + '%';

  localStorage.setItem('xp', xp);
  localStorage.setItem('taps', taps);
}

update();

let rewardAd, taskAd;

window.onload = () => {
  if(typeof Adsgram !== 'undefined'){
    rewardAd = Adsgram.init({ blockId:'29779' });
    taskAd = Adsgram.init({ blockId:'29780' });
  }
};


document.getElementById('tapBtn').onclick = () => {
  xp += 1;
  taps += 1;
  update();
};


document.getElementById('rewardBtn').onclick = async () => {
  if(!rewardAd) return alert('Ad not ready');

  try{
    const res = await rewardAd.show();

    if(res?.done){
      xp += 10;
      update();
      alert('Reward Added');
    }
  }catch(e){}
};


document.getElementById('taskBtn').onclick = async () => {
  if(!taskAd) return alert('Task ad not ready');

  try{
    const res = await taskAd.show();

    if(res?.done){
      xp += 100;
      update();
      alert('Task Completed');
    }
  }catch(e){}
};


document.getElementById('dailyBtn').onclick = () => {
  let now = Date.now();

  if(now - lastDaily < 86400000){
    return alert('Come back tomorrow');
  }

  xp += 50;
  update();

  lastDaily = now;
  localStorage.setItem('daily', now);

  alert('Daily Reward Claimed');
};


document.getElementById('copyBtn').onclick = () => {
  let input = document.getElementById('refInput');
  input.select();
  document.execCommand('copy');

  alert('Referral Link Copied');
};


document.getElementById('withdrawBtn').onclick = () => {
  let amount = parseInt(document.getElementById('amount').value);

  if(!amount || amount < 10000){
    return alert('Minimum withdrawal is 10,000 XP');
  }

  if(xp < amount){
    return alert('Not enough XP');
  }

  xp -= amount;
  update();

  alert('Withdraw Request Sent');
};



</script>

</body>
</html>
