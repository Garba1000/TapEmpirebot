<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn X</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#07111f;
  color:white;
  font-family:Arial;
  padding:18px;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#00e0ff;
}

.level{
  background:#132033;
  padding:8px 14px;
  border-radius:30px;
  font-size:14px;
}

.balance-box{
  background:linear-gradient(135deg,#00e0ff,#0077ff);
  border-radius:24px;
  padding:30px 20px;
  text-align:center;
}

.balance-box h2{
  font-size:50px;
  margin-top:10px;
}

.progress{
  width:100%;
  height:10px;
  background:#ffffff33;
  border-radius:30px;
  overflow:hidden;
  margin-top:15px;
}

.progress div{
  width:0%;
  height:100%;
  background:#fff;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin:20px 0;
}

.card{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  border:1px solid #1f2d44;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:14px;
  background:linear-gradient(45deg,#00e0ff,#0077ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#101b2d;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#18263b;
  color:white;
  margin-top:10px;
}

#joinPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

#joinPopup h2{
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">⚡ Tap & Earn X</div>
  <div class="level">
    Level <span id="level">1</span>
  </div>
</div>

<div class="balance-box">
  <p>Total XP</p>
  <h2 id="points">0</h2>

  <div class="progress">
    <div id="bar"></div>
  </div>
</div>

<div class="grid">
  <div class="card">
    👆 Taps
    <p id="taps">0</p>
  </div>

  <div class="card">
    🏆 Rank
    <p>Starter</p>
  </div>

  <div class="card">
    👥 Referrals
    <p id="refCount">0</p>
  </div>
</div>

<div class="section">
  <h2>Tap</h2>
  <button class="btn" id="tapBtn">
    Tap +1 XP
  </button>
</div>

<div class="section">
  <h2>Reward Ad</h2>
  <button class="btn" id="rewardBtn">
    Watch Ad +10 XP
  </button>
</div>

<div class="section">
  <h2>Task</h2>
  <button class="btn" id="taskBtn">
    Complete Task +10 XP
  </button>
</div>

<div class="section">
  <h2>Referral</h2>

  <input id="refInput" readonly>
</div>

<div id="joinPopup">
  <h2>Join Channel</h2>

  <button id="joinBtn" class="btn">
    Join +5 XP
  </button>
</div>

<script type="module">

/* FIREBASE */
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  update
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyC2dCYo4mgndxzFNSlcwGr1V7Ypp6VC0Cw",
  authDomain: "urser-a8a29.firebaseapp.com",
  databaseURL: "https://urser-a8a29-default-rtdb.firebaseio.com",
  projectId: "urser-a8a29",
  storageBucket: "urser-a8a29.firebasestorage.app",
  messagingSenderId: "773141119167",
  appId: "1:773141119167:web:368cd714478d906ea9c60a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TELEGRAM */
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

/* REF PARAM */
const startParam =
new URLSearchParams(window.location.search).get("start");

/* REF LINK */
if(user){

  document.getElementById("refInput").value =
  `https://t.me/Profitvablebot?start=${user.id}`;
}

/* SAVE USER */
async function saveUser(){

  if(!user) return;

  const uid = user.id.toString();

  const userRef = ref(db,"users/" + uid);

  const snap = await get(userRef);

  if(!snap.exists()){

    const referredBy =
    startParam &&
    startParam !== uid
    ? startParam.toString()
    : null;

    await set(userRef,{
      telegram_id: uid,
      username: user.username || "User",
      balance: 0,
      referrals: 0,
      referred_by: referredBy
    });

    /* REF BONUS */
    if(referredBy){

      const refRef = ref(db,"users/" + referredBy);

      const refSnap = await get(refRef);

      if(refSnap.exists()){

        const data = refSnap.val();

        await update(refRef,{
          referrals: (data.referrals || 0) + 1
        });
      }
    }
  }
}

saveUser();

/* LIVE REF */
async function liveRef(){

  if(!user) return;

  setInterval(async()=>{

    const snap =
    await get(ref(db,"users/" + user.id));

    if(snap.exists()){

      document.getElementById("refCount").innerText =
      snap.val().referrals || 0;
    }

  },3000);
}

liveRef();

/* XP */
let xp = 0;
let taps = 0;

function updateUI(){

  document.getElementById("points").innerText = xp;

  document.getElementById("taps").innerText = taps;

  const level = Math.floor(xp / 500) + 1;

  document.getElementById("level").innerText = level;

  document.getElementById("bar").style.width =
  ((xp % 500) / 500) * 100 + "%";

  /* SAVE BALANCE */
  if(user){

    update(
      ref(db,"users/" + user.id),
      {
        balance: xp
      }
    );
  }
}

/* ADSGRAM */
let rewardAd;
let taskAd;

window.onload = ()=>{

  if(typeof Adsgram !== "undefined"){

    /* KEEPING YOUR ORIGINAL BLOCK IDS */
    rewardAd = Adsgram.init({
      blockId:"29779"
    });

    taskAd = Adsgram.init({
      blockId:"29780"
    });

    let joinAd = Adsgram.init({
      blockId:"29780"
    });

    joinAd.show().finally(()=>{

      document.getElementById(
        "joinPopup"
      ).style.display = "flex";

    });

  }else{

    console.log("Adsgram failed to load");

  }
};

/* TAP BUTTON */
document.getElementById(
"tapBtn"
).onclick = ()=>{

  xp++;
  taps++;

  updateUI();
};

/* REWARD BUTTON */
document.getElementById(
"rewardBtn"
).onclick = async ()=>{

  if(!rewardAd){

    alert("Reward ad not loaded");
    return;
  }

  try{

    const r = await rewardAd.show();

    if(r?.done){

      xp += 10;

      updateUI();
    }

  }catch(err){

    console.log(err);

  }
};

/* TASK BUTTON */
document.getElementById(
"taskBtn"
).onclick = async ()=>{

  if(!taskAd){

    alert("Task ad not loaded");
    return;
  }

  try{

    const r = await taskAd.show();

    if(r?.done){

      xp += 10;

      updateUI();
    }

  }catch(err){

    console.log(err);

  }
};

/* JOIN BUTTON */
document.getElementById(
"joinBtn"
).onclick = ()=>{

  xp += 5;

  updateUI();

  window.open(
    "https://t.me/CashGyana",
    "_blank"
  );
};

updateUI();

</script>

</body>
</html>
